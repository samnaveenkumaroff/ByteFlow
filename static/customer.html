<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ByteFlow Mart — Shop</title>
<link rel="stylesheet" href="/static/shared.css">
<style>
.hero{background:linear-gradient(135deg,var(--navy-card),var(--navy-raised));
  border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem 2rem;
  margin-bottom:1.5rem;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;
  border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.07),transparent 70%);}
.filter-bar{display:flex;gap:.75rem;margin-bottom:1.2rem;flex-wrap:wrap;}
.filter-bar input,.filter-bar select{
  background:var(--navy-card);border:1px solid var(--border);border-radius:8px;
  padding:.5rem .85rem;color:var(--text-1);font-family:Inter,sans-serif;font-size:.875rem;outline:none;}
.filter-bar input{flex:1;min-width:160px;}
.price-main{font-size:1.9rem;font-weight:800;color:var(--gold);}
.price-strike{font-size:1rem;color:var(--text-3);text-decoration:line-through;margin-left:.4rem;}
.order-card{background:var(--navy-card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:1.2rem 1.4rem;margin-bottom:1rem;animation:slideUp .35s ease;}
.detail-img-wrap{background:linear-gradient(135deg,var(--navy-mid),var(--navy-card));
  border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;
  display:flex;align-items:center;justify-content:center;overflow:hidden;}
.detail-img{max-width:100%;max-height:280px;object-fit:contain;
  transition:transform .4s ease;cursor:zoom-in;}
.detail-img:hover{transform:scale(1.06);}
</style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">⚡</div>
      <div class="sidebar-logo-name">ByteFlow Mart</div>
      <div class="sidebar-logo-sub">Premium Electronics</div>
    </div>
    <div class="nav-section">Shop</div>
    <div class="nav-item active" data-page="browse" onclick="showPage('browse')">
      <span class="icon">🏪</span> Browse Products
    </div>
    <div class="nav-item" data-page="orders" onclick="showPage('orders')">
      <span class="icon">🛒</span> My Orders
    </div>
    <div class="nav-section">Account</div>
    <div class="nav-item" data-page="account" onclick="showPage('account')">
      <span class="icon">👤</span> My Account
    </div>
    <div class="sidebar-bottom" id="sidebar-user"></div>
  </aside>

  <main class="main-content">
    <div id="page-browse"></div>
    <div id="page-orders" style="display:none;"></div>
    <div id="page-account" style="display:none;"></div>
  </main>
</div>

<script src="/static/shared.js"></script>
<script>
const user = requireAuth('customer');
renderSidebarUser(user);

function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(n =>
    n.classList.toggle('active', n.dataset.page === page));
  ['browse','orders','account'].forEach(p => {
    document.getElementById('page-'+p).style.display = p===page?'block':'none';
  });
  const loaders = {browse:loadBrowse, orders:loadOrders, account:loadAccount};
  if (loaders[page]) loaders[page]();
}
loadBrowse();

function fmtPrice(n){return '₹'+Number(n).toLocaleString('en-IN');}

// ══════════════════════════════════════════
// BROWSE
// ══════════════════════════════════════════
let allProducts = [];
async function loadBrowse() {
  const el = document.getElementById('page-browse');
  el.innerHTML = `<div class="skeleton" style="height:300px;"></div>`;
  try {
    const d = await api('/api/customer/products');
    allProducts = d.products || [];
    renderBrowse();
  } catch(e) {
    el.innerHTML = renderAlert('Failed to load: '+e.message,'error');
  }
}

function renderBrowse() {
  const el = document.getElementById('page-browse');
  el.innerHTML = `
  <div class="hero anim">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <div>
        <h2 style="margin:0;font-size:1.5rem;font-family:'Playfair Display',serif;color:var(--gold);">
          ⚡ Mega Tech Sale
        </h2>
        <p style="color:var(--text-3);margin:.3rem 0 0;font-size:.84rem;">
          Up to 21% off on flagship smartphones · Free delivery above ₹999
        </p>
      </div>
      <span class="badge badge-red badge-pulse">🔥 LIMITED STOCK</span>
    </div>
  </div>

  <div class="filter-bar">
    <input type="text" id="c-search" placeholder="🔍 Search products..." oninput="filterCustomer()">
    <select id="c-sort" onchange="filterCustomer()">
      <option>Featured</option><option>Price: Low→High</option>
      <option>Price: High→Low</option><option>Best Rating</option>
    </select>
    <select id="c-cat" onchange="filterCustomer()">
      <option value="">All Categories</option>
      ${[...new Set(allProducts.map(p=>p.category||'Other'))].map(c=>`<option>${c}</option>`).join('')}
    </select>
  </div>

  <p id="c-count" style="color:var(--text-3);font-size:.78rem;margin-bottom:.75rem;"></p>
  <div class="product-grid" id="c-grid"></div>`;

  filterCustomer();
  initRipple('.btn');
}

function filterCustomer() {
  const search = (document.getElementById('c-search')?.value||'').toLowerCase();
  const sort   = document.getElementById('c-sort')?.value||'Featured';
  const cat    = document.getElementById('c-cat')?.value||'';
  let list = [...allProducts];
  if (search) list = list.filter(p => p.product_name.toLowerCase().includes(search));
  if (cat)    list = list.filter(p => p.category === cat);
  if (sort==='Price: Low→High')  list.sort((a,b)=>a.our_price-b.our_price);
  if (sort==='Price: High→Low') list.sort((a,b)=>b.our_price-a.our_price);
  if (sort==='Best Rating')      list.sort((a,b)=>(b.rating||0)-(a.rating||0));

  const countEl = document.getElementById('c-count');
  if (countEl) countEl.textContent = `${list.length} products found`;

  const grid = document.getElementById('c-grid');
  if (!grid) return;
  grid.innerHTML = list.map(p => {
    const stock = p.stock||0;
    const sc = stock>20?'var(--green)':stock>0?'var(--orange)':'var(--red)';
    const st = stock>20?`In Stock (${stock})`:stock>0?`Only ${stock} left!`:'Out of Stock';
    return `
    <div class="product-card anim" onclick="viewProduct('${p.id}')">
      <img class="product-card-img" src="${p.image_url||''}"
           onerror="this.src='https://placehold.co/220x180/101f3a/c9a84c?text=📱'">
      <div class="product-card-body">
        <div class="product-card-name">${p.product_name}</div>
        <div style="margin:.35rem 0;display:flex;align-items:baseline;flex-wrap:wrap;gap:.25rem;">
          <span class="product-card-price">${fmtPrice(p.our_price)}</span>
          <span class="product-card-strike">${fmtPrice(p.original_price||0)}</span>
          <span class="badge badge-green">${p.discount||0}% off</span>
        </div>
        <div style="color:var(--gold);font-size:.78rem;margin:.2rem 0;">
          ${'⭐'.repeat(Math.round(p.rating||0))}
          <span style="color:var(--text-3);font-size:.7rem;margin-left:.3rem;">(${(p.rating_count||0).toLocaleString('en-IN')})</span>
        </div>
        <div style="font-size:.72rem;color:${sc};font-weight:600;">${st}</div>
        <div style="font-size:.72rem;color:var(--text-3);margin-top:.15rem;">🚚 ${p.delivery_days||3}-day delivery</div>
        <div style="display:flex;gap:.5rem;margin-top:.65rem;" onclick="event.stopPropagation()">
          <button class="btn btn-outline btn-sm" style="flex:1" onclick="viewProduct('${p.id}')">View</button>
          <button class="btn btn-gold btn-sm" style="flex:1" onclick="quickBuy('${p.id}')"
            ${stock===0?'disabled':''}>Buy</button>
        </div>
      </div>
    </div>`;
  }).join('');
  initTilt('.product-card');
  initRipple('.btn');
}

// ── Product Detail ────────────────────────────────────
async function viewProduct(pid) {
  const el = document.getElementById('page-browse');
  el.innerHTML = `
  <button class="btn btn-outline btn-sm" style="margin-bottom:1rem;" onclick="loadBrowse()">← Back</button>
  <div class="skeleton" style="height:400px;"></div>`;

  try {
    const d = await api(`/api/customer/product/${pid}`);
    const p = d.product; const bundles = d.bundles||[];
    const save = (p.original_price||0) - p.our_price;

    el.innerHTML = `
    <button class="btn btn-outline btn-sm anim" style="margin-bottom:1rem;" onclick="loadBrowse()">
      ← Back to Products
    </button>
    <div style="display:grid;grid-template-columns:1fr 1.6fr;gap:1.5rem;flex-wrap:wrap;">
      <div>
        <div class="detail-img-wrap">
          <img class="detail-img" src="${p.image_url||''}"
               onerror="this.src='https://placehold.co/300x280/101f3a/c9a84c?text=📱'">
        </div>
        ${bundles.length ? `
          <div class="section-title" style="margin-top:1.2rem;">🎁 Frequently Bought Together</div>
          ${bundles.map(b=>renderBundleCard(b)).join('')}
        ` : ''}
      </div>

      <div class="anim">
        <h2 style="font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--text-1);
                   font-weight:700;line-height:1.3;margin-bottom:.75rem;">
          ${p.title||p.product_name}
        </h2>

        <div class="card" style="padding:1rem 1.2rem;margin-bottom:1rem;">
          <div style="display:flex;align-items:baseline;gap:.6rem;flex-wrap:wrap;">
            <span class="price-main">${fmtPrice(p.our_price)}</span>
            <span class="price-strike">${fmtPrice(p.original_price||0)}</span>
            <span class="badge badge-green">${p.discount||0}% off</span>
          </div>
          <div style="color:var(--text-3);font-size:.78rem;margin-top:.3rem;">
            Retail: ${fmtPrice(p.retail_price||0)} &nbsp;·&nbsp;
            You save: <span style="color:var(--green);font-weight:700;">${fmtPrice(save)}</span>
          </div>
        </div>

        <div style="margin-bottom:.75rem;">
          <span style="color:var(--gold);">${'⭐'.repeat(Math.round(p.rating||0))}</span>
          <span style="color:var(--text-1);font-weight:700;margin-left:.3rem;">${p.rating||0}</span>
          <span style="color:var(--text-3);font-size:.82rem;"> (${(p.rating_count||0).toLocaleString('en-IN')} ratings)</span>
        </div>

        <p style="color:var(--text-2);font-size:.875rem;line-height:1.75;margin-bottom:1rem;">
          ${p.description||''}
        </p>

        ${p.attributes && Object.keys(p.attributes).length ? `
        <details style="margin-bottom:.75rem;">
          <summary style="cursor:pointer;color:var(--gold-light);font-weight:600;font-size:.875rem;
                          padding:.5rem;background:var(--navy-raised);border-radius:6px;
                          border:1px solid var(--border);">📐 Specifications</summary>
          <div style="padding:.75rem;background:var(--navy-mid);border:1px solid var(--border);
                      border-top:none;border-radius:0 0 6px 6px;">
            <table class="spec-table">
              ${Object.entries(p.attributes).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
            </table>
          </div>
        </details>` : ''}

        <div class="card" style="padding:.85rem 1rem;margin-bottom:1rem;" id="delivery-card">
          <div style="font-size:.72rem;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;">
            Estimated Delivery
          </div>
          <div style="font-weight:700;color:var(--text-1);margin-top:.2rem;">
            🚚 ${p.delivery_days||3} days —
            <span style="color:var(--gold);" id="delivery-date-display">calculating...</span>
          </div>
        </div>

        ${(p.stock||0) <= 5 && (p.stock||0) > 0 ?
          renderAlert(`⚡ Only ${p.stock} units left — order soon!`,'warn') : ''}

        ${(p.stock||0) > 0 ? `
        <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;">
          <label style="color:var(--text-3);font-size:.82rem;font-weight:600;">Qty:</label>
          <input type="number" id="buy-qty" value="1" min="1" max="${Math.min(p.stock,10)}"
            style="width:70px;background:var(--navy-raised);border:1px solid var(--border);
                   border-radius:6px;padding:.4rem .6rem;color:var(--text-1);font-family:Inter,sans-serif;
                   font-size:.875rem;outline:none;text-align:center;">
        </div>
        <div style="display:flex;gap:.75rem;">
          <button class="btn btn-outline" style="flex:1;" onclick="addToCart('${pid}','${p.product_name.replace(/'/g,"\\'")}')">
            🛒 Add to Cart
          </button>
          <button class="btn btn-gold" style="flex:1;" onclick="buyNow('${pid}')">
            ⚡ Buy Now
          </button>
        </div>` :
        `<div class="badge badge-red" style="font-size:.9rem;padding:6px 16px;">✗ Out of Stock</div>`}

        <div id="buy-result" style="margin-top:.75rem;"></div>
      </div>
    </div>

    ${p.reviews?.length ? `
    <hr>
    <div class="section-title">⭐ Customer Reviews</div>
    <div class="product-grid" style="grid-template-columns:repeat(auto-fill,minmax(240px,1fr));">
      ${p.reviews.map(r=>`
        <div class="card anim" style="padding:.9rem;">
          <div style="font-weight:700;font-size:.85rem;">${r.user}</div>
          <div style="color:var(--gold);margin:.2rem 0;">${'⭐'.repeat(r.rating||5)}</div>
          <div style="color:var(--text-2);font-size:.82rem;line-height:1.6;">${r.text}</div>
          <div style="color:var(--text-3);font-size:.7rem;margin-top:.35rem;">${r.date}</div>
        </div>`).join('')}
    </div>` : ''}`;

    // Load delivery estimate
    const loc = user.location || {};
    if (loc.state && loc.pincode) {
      try {
        const de = await api(`/api/customer/delivery-estimate?buyer_state=${encodeURIComponent(loc.state)}&buyer_pincode=${loc.pincode}`);
        document.getElementById('delivery-date-display').textContent = `by ${de.date} (${de.days} days)`;
      } catch(e) {}
    } else {
      document.getElementById('delivery-date-display').textContent = `${p.delivery_days||3} days`;
    }

    initRipple('.btn');
  } catch(e) {
    el.innerHTML = renderAlert('Failed to load product: '+e.message,'error');
  }
}

function addToCart(pid, name) {
  const qty  = parseInt(document.getElementById('buy-qty')?.value||1);
  const cart = JSON.parse(localStorage.getItem('bf_cart')||'[]');
  cart.push({product_id: pid, qty});
  localStorage.setItem('bf_cart', JSON.stringify(cart));
  document.getElementById('buy-result').innerHTML = renderAlert(`✅ Added ${qty}x "${name}" to cart!`,'success');
}

async function buyNow(pid) {
  const qty = parseInt(document.getElementById('buy-qty')?.value||1);
  const loc = user.location || {state:'Karnataka',pincode:'560038'};
  try {
    const d = await api('/api/customer/order','POST',{
      user_id: user.id, product_id: pid, quantity: qty, buyer_location: loc
    });
    document.getElementById('buy-result').innerHTML =
      renderAlert(`✅ Order placed! <b>#${d.order.order_id}</b> · Delivery by ${d.order.delivery_date}`,'success');
  } catch(e) {
    document.getElementById('buy-result').innerHTML = renderAlert('❌ '+e.message,'error');
  }
}

async function quickBuy(pid) {
  const loc = user.location || {state:'Karnataka',pincode:'560038'};
  try {
    const d = await api('/api/customer/order','POST',{
      user_id: user.id, product_id: pid, quantity: 1, buyer_location: loc
    });
    toast(`✅ Order placed! #${d.order.order_id} · Delivery by ${d.order.delivery_date}`,'success');
    loadBrowse();
  } catch(e) { toast('❌ '+e.message,'error'); }
}

// ══════════════════════════════════════════
// ORDERS
// ══════════════════════════════════════════
async function loadOrders() {
  const el = document.getElementById('page-orders');
  el.innerHTML = `<div class="skeleton" style="height:200px;"></div>`;
  try {
    const d = await api(`/api/customer/orders/${user.id}`);
    const orders = (d.orders||[]).sort((a,b)=>b.placed_at.localeCompare(a.placed_at));
    const totalSpent = orders.reduce((s,o)=>s+(o.total||0),0);

    el.innerHTML = `
    <div class="page-header anim">
      <h1>🛒 My Orders</h1>
      <p>Track your purchases and deliveries</p>
    </div>
    <div style="display:flex;gap:.85rem;margin-bottom:1.2rem;flex-wrap:wrap;">
      <div class="metric-card" style="flex:1;min-width:120px;text-align:center;">
        <div class="metric-val" data-target="${orders.length}">${orders.length}</div>
        <div class="metric-lbl">Total Orders</div>
      </div>
      <div class="metric-card" style="flex:1;min-width:120px;text-align:center;">
        <div class="metric-val" data-prefix="₹" data-target="${totalSpent}">${fmtPrice(totalSpent)}</div>
        <div class="metric-lbl">Total Spent</div>
      </div>
    </div>

    ${!orders.length ? `
    <div class="card" style="text-align:center;padding:3rem;color:var(--text-3);">
      <div style="font-size:3rem;margin-bottom:.75rem;">🛒</div>
      <div>No orders yet. <span style="color:var(--gold);cursor:pointer;" onclick="showPage('browse')">Browse products →</span></div>
    </div>` :
    orders.map(o => {
      const sColor = {Confirmed:'#3498db',Processing:'#9b59b6',Shipped:'#e67e22','Out for Delivery':'#f39c12',Delivered:'#27ae60'}[o.status]||'#3498db';
      return `
      <div class="order-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:.85rem;">
          <div>
            <div style="font-size:.72rem;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Order ID</div>
            <div style="font-weight:800;color:var(--gold);font-size:1rem;">#${o.order_id}</div>
            <div style="font-size:.75rem;color:var(--text-3);margin-top:.1rem;">Placed: ${o.placed_at?.slice(0,10)||'—'}</div>
          </div>
          <span class="badge" style="color:${sColor};border-color:${sColor}44;background:${sColor}18;font-size:.78rem;padding:4px 12px;">
            ${o.status}
          </span>
        </div>
        <div style="background:var(--navy-mid);border:1px solid var(--border);border-radius:var(--radius);
                    padding:.75rem 1rem;margin-bottom:.85rem;">
          <div style="font-weight:700;color:var(--text-1);">${o.product_name}</div>
          <div style="font-size:.8rem;color:var(--text-3);margin-top:.2rem;">
            Qty: ${o.quantity} &nbsp;·&nbsp;
            Total: <span style="color:var(--gold);font-weight:700;">${fmtPrice(o.total||0)}</span>
          </div>
        </div>
        ${renderOrderTracker(o.status)}
        <div style="display:flex;justify-content:space-between;margin-top:.6rem;
                    padding-top:.6rem;border-top:1px solid var(--border);">
          <div style="font-size:.8rem;color:var(--text-2);">
            🚚 Delivery: <span style="color:var(--gold);font-weight:700;">${o.delivery_date||'—'}</span>
          </div>
          <div style="font-size:.75rem;color:var(--text-3);">
            ${o.buyer_location?.city||'—'}
          </div>
        </div>
      </div>`;
    }).join('')}`;
    animateCounters();
  } catch(e) {
    el.innerHTML = renderAlert('Failed to load orders: '+e.message,'error');
  }
}

// ══════════════════════════════════════════
// ACCOUNT
// ══════════════════════════════════════════
async function loadAccount() {
  const el = document.getElementById('page-account');
  const orders = await api(`/api/customer/orders/${user.id}`).catch(()=>({orders:[]}));
  const totalSpent = (orders.orders||[]).reduce((s,o)=>s+(o.total||0),0);

  el.innerHTML = `
  <div class="page-header anim">
    <h1>👤 My Account</h1>
    <p>Manage your profile and delivery address</p>
  </div>
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:1.2rem;">
    <div class="card">
      <div class="card-title">Personal Information</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;">
        <div class="field"><label>Full Name</label>
          <input type="text" id="acc-name" value="${user.name||''}"></div>
        <div class="field"><label>Email</label>
          <input type="email" id="acc-email" value="${user.email||''}" disabled></div>
        <div class="field"><label>Phone</label>
          <input type="text" id="acc-phone" value="${user.phone||''}"></div>
        <div class="field"><label>Address</label>
          <input type="text" id="acc-addr" value="${user.location?.address||''}"></div>
        <div class="field"><label>City</label>
          <input type="text" id="acc-city" value="${user.location?.city||''}"></div>
        <div class="field"><label>State</label>
          <input type="text" id="acc-state" value="${user.location?.state||''}"></div>
        <div class="field"><label>Pincode</label>
          <input type="text" id="acc-pin" value="${user.location?.pincode||''}"></div>
      </div>
      <div id="acc-alert" style="margin-top:.5rem;"></div>
      <button class="btn btn-gold" style="margin-top:.75rem;" onclick="saveAccount()">
        💾 Update Account
      </button>
    </div>

    <div>
      <div class="metric-card" style="text-align:center;margin-bottom:.85rem;">
        <div class="metric-val" data-target="${(orders.orders||[]).length}">${(orders.orders||[]).length}</div>
        <div class="metric-lbl">Total Orders</div>
      </div>
      <div class="metric-card" style="text-align:center;margin-bottom:.85rem;">
        <div class="metric-val" data-prefix="₹" data-target="${totalSpent}">${fmtPrice(totalSpent)}</div>
        <div class="metric-lbl">Total Spent</div>
      </div>
      <div class="card">
        <div class="card-title">📍 Delivery Address</div>
        <div style="font-size:.85rem;color:var(--text-2);line-height:1.8;">
          ${user.location?.address||'—'}<br>
          ${user.location?.city||'—'}, ${user.location?.state||'—'}<br>
          PIN: ${user.location?.pincode||'—'}
        </div>
      </div>
    </div>
  </div>`;
  animateCounters(); initRipple('.btn');
}

async function saveAccount() {
  const updated = Object.assign({}, user, {
    name:  document.getElementById('acc-name').value,
    phone: document.getElementById('acc-phone').value,
    location: {
      address: document.getElementById('acc-addr').value,
      city:    document.getElementById('acc-city').value,
      state:   document.getElementById('acc-state').value,
      pincode: document.getElementById('acc-pin').value,
    }
  });
  // Update localStorage
  localStorage.setItem('bf_user', JSON.stringify(updated));
  Object.assign(user, updated);
  toast('✅ Account updated.','success');
  document.getElementById('acc-alert').innerHTML = renderAlert('✅ Saved successfully.','success');
}
</script>
</body>
</html>
